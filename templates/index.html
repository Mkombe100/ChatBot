<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ORION 5 · Real Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 12px;
        }

        .phone-frame {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 38px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        .bot-header {
            background: linear-gradient(135deg, #0f1a24 0%, #0a121b 100%);
            padding: 20px 20px 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
        }

        .avatar {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            width: 52px;
            height: 52px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .avatar svg {
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.2));
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 1.45rem;
            font-weight: 600;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .header-text p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 0 1px rgba(46, 204, 113, 0.4);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        .chat-area {
            background: #f7f9fc;
            height: 60vh;
            max-height: 520px;
            min-height: 420px;
            overflow-y: auto;
            padding: 18px 14px 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #e4e8f0;
            border-radius: 10px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #b9c4d1;
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .bot-message .bubble {
            background: white;
            border-bottom-left-radius: 6px;
            color: #1f2f3a;
            border: 1px solid #e9edf2;
        }

        .user-message .bubble {
            background: #1e2b3c;
            color: white;
            border-bottom-right-radius: 6px;
            background: linear-gradient(135deg, #1f3346, #14222e);
        }

        .message small {
            font-size: 0.65rem;
            opacity: 0.6;
            margin: 0 4px 4px 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 10px 18px;
            border-radius: 24px;
            width: fit-content;
            border-bottom-left-radius: 6px;
            border: 1px solid #eef2f7;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #a0b3c9;
            border-radius: 50%;
            display: inline-block;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .input-panel {
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            padding: 12px 16px 20px 16px;
            backdrop-filter: blur(4px);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f4f9;
            border-radius: 48px;
            padding: 6px 6px 6px 20px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .input-wrapper:focus-within {
            background: #ffffff;
            border-color: #e67e22;
            box-shadow: 0 0 0 2px rgba(230, 126, 34, 0.2);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 12px 0;
            outline: none;
            font-family: inherit;
            color: #1a2c3a;
        }

        .input-wrapper input::placeholder {
            color: #9aaebf;
            font-weight: 400;
        }

        .send-btn {
            background: #e67e22;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }

        .send-btn:active {
            transform: scale(0.94);
            background: #d35400;
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        /* No extra items below input - clean design */
        .error-bubble {
            background: #ffe6e5 !important;
            color: #c0392b !important;
            border-left: 3px solid #e74c3c;
        }

        .empty-div {
            height: 4px;
        }

        @media (max-width: 480px) {
            .phone-frame {
                border-radius: 28px;
            }
            .chat-area {
                height: 58vh;
                min-height: 380px;
            }
            .bubble {
                font-size: 0.85rem;
                padding: 10px 14px;
            }
            .bot-header {
                padding: 14px 18px;
            }
            .avatar {
                width: 44px;
                height: 44px;
            }
            .avatar svg {
                width: 26px;
                height: 26px;
            }
            .header-text h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="bot-header">
        <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM9.5 8C10.33 8 11 8.67 11 9.5S10.33 11 9.5 11 8 10.33 8 9.5 8.67 8 9.5 8zm5 0c.83 0 1.5.67 1.5 1.5S15.33 11 14.5 11 13 10.33 13 9.5 13.67 8 14.5 8zM12 17.5c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z" fill="white"/>
            </svg>
        </div>
        <div class="header-text">
            <h1>ORION 5</h1>
            <p><span class="status-dot"></span> Active · AI Assistant</p>
        </div>
    </div>

    <!-- Clean input panel - NO extra items below input, only send button and input field -->
    <div class="input-panel">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" enterkeyhint="send">
            <button class="send-btn" id="sendBtn" aria-label="Send message">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>


<script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ---------- SCROLL TO BOTTOM (shows newest message immediately) ----------
    function scrollToBottom(behavior = 'smooth') {
        chatContainer.scrollTo({
            top: chatContainer.scrollHeight,
            behavior: behavior
        });
    }

    // Helper: escape HTML to prevent injection
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Format bot message with bold and line breaks
    function formatBotMessage(text) {
        let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\n/g, '<br>');
        return formatted;
    }

    // Add message to chat and auto-scroll to show it (real chat behavior)
    function addMessage(text, sender, isError = false) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        if (sender === 'user') {
            messageDiv.classList.add('user-message');
        } else {
            messageDiv.classList.add('bot-message');
        }
        
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        if (isError && sender === 'bot') {
            bubble.classList.add('error-bubble');
        }
        
        if (sender === 'bot') {
            bubble.innerHTML = formatBotMessage(escapeHtml(text));
        } else {
            bubble.textContent = text;
        }
        
        messageDiv.appendChild(bubble);
        
        // Add timestamp for realism
        const timeSpan = document.createElement('small');
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        timeSpan.textContent = timeStr;
        messageDiv.appendChild(timeSpan);
        
        chatContainer.appendChild(messageDiv);

        // Scroll to newest message immediately
        requestAnimationFrame(() => scrollToBottom('smooth'));

        return messageDiv;
    }

    // Typing indicator management
    let typingElement = null;
    function showTypingIndicator() {
        if (typingElement) removeTypingIndicator();
        const typingDiv = document.createElement('div');
        typingDiv.classList.add('message', 'bot-message');
        typingDiv.id = 'typingIndicator';
        const indicatorBox = document.createElement('div');
        indicatorBox.classList.add('typing-indicator');
        indicatorBox.innerHTML = `<span></span><span></span><span></span>`;
        typingDiv.appendChild(indicatorBox);
        chatContainer.appendChild(typingDiv);
        requestAnimationFrame(() => scrollToBottom('smooth'));
        typingElement = typingDiv;
    }
    
    function removeTypingIndicator() {
        if (typingElement && typingElement.parentNode) {
            typingElement.remove();
            typingElement = null;
        }
    }

    // ---------- BACKEND CALL TO FLASK (/chat) ----------
    async function sendMessageToBackend(userMessage) {
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: userMessage }),
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server error (${response.status}): ${errorText.substring(0, 100)}`);
            }
            
            const data = await response.json();
            if (data && data.reply) {
                return data.reply;
            } else {
                throw new Error('Invalid response format from server');
            }
        } catch (err) {
            console.error('Fetch error:', err);
            throw new Error(`Connection issue: ${err.message}`);
        }
    }

    // ---------- MAIN HANDLER: Real chat behavior ----------
    async function handleUserMessage(rawText) {
        const text = rawText.trim();
        if (text === "") return false;
        
        // 1. Add user message
        addMessage(text, 'user');
        
        // 2. Clear input
        messageInput.value = '';
        messageInput.focus();
        
        // 3. Show typing indicator
        showTypingIndicator();
        
        try {
            // 4. Get bot response
            const botReply = await sendMessageToBackend(text);
            removeTypingIndicator();
            
            // 5. Add bot response
            addMessage(botReply, 'bot', false);
        } catch (error) {
            removeTypingIndicator();
            const errorMsg = ` ${error.message}. Please ensure Flask server is running and OpenAI API key is valid.`;
            addMessage(errorMsg, 'bot', true);
            console.error("ORION 5 API error:", error);
        }
        return true;
    }

    // Send message from button click
    function sendCurrentMessage() {
        const msg = messageInput.value;
        if (msg.length > 0) {
            handleUserMessage(msg);
        } else {
            // Subtle feedback for empty message
            messageInput.placeholder = "Type something...";
            setTimeout(() => {
                messageInput.placeholder = "Type your message...";
            }, 800);
        }
    }

    // ========== REAL CHAT ENHANCEMENTS ==========
    // Auto-scroll on resize (mobile keyboard)
    let resizeTimer;
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            scrollToBottom('auto');
        }, 150);
    });
    
    // Scroll when input is focused
    messageInput.addEventListener('focus', () => {
        setTimeout(() => {
            scrollToBottom('smooth');
        }, 300);
    });
    
    // Mutation observer to auto-scroll
    const observer = new MutationObserver(() => {
        scrollToBottom('smooth');
    });
    
    // Load event
    window.addEventListener('load', () => {
        setTimeout(() => scrollToBottom('auto'), 100);
        messageInput.focus();
        observer.observe(chatContainer, { childList: true, subtree: true });
        checkServerHealth();
    });
    
    // Event listeners
    sendBtn.addEventListener('click', sendCurrentMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendCurrentMessage();
        }
    });
    
    // Health check
    async function checkServerHealth() {
        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'ping' }),
            });
            if (!res.ok) {
                console.warn(" Server responded with error.");
            } else {
                console.log(" Backend connection successful");
            }
        } catch(e) {
            console.warn(" Flask backend not reachable. Run 'python app.py'.");
        }
    }

    console.log("ORION 5 Chat Interface Ready — All messages scroll naturally.");
</script>


</body>
</html>
